<!DOCTYPE html>
<html>
    <head>
        <title>Math Services</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <h1>Math Services - Proxy Activo/Pasivo</h1>

        <h2>Suma</h2>
        <input type="number" id="sumA" value="3"> +
        <input type="number" id="sumB" value="5">
        <input type="button" value="Calcular" onclick="calc('sum')">
        <div id="sumResult"></div>

        <h2>Resta</h2>
        <input type="number" id="subA" value="10"> -
        <input type="number" id="subB" value="4">
        <input type="button" value="Calcular" onclick="calc('sub')">
        <div id="subResult"></div>

        <h2>Multiplicacion</h2>
        <input type="number" id="mulA" value="6"> x
        <input type="number" id="mulB" value="7">
        <input type="button" value="Calcular" onclick="calc('mul')">
        <div id="mulResult"></div>

        <h2>Division</h2>
        <input type="number" id="divA" value="20"> /
        <input type="number" id="divB" value="4">
        <input type="button" value="Calcular" onclick="calc('div')">
        <div id="divResult"></div>

        <script>
            function calc(op) {
                var a = document.getElementById(op + "A").value;
                var b = document.getElementById(op + "B").value;
                var xhttp = new XMLHttpRequest();
                xhttp.onload = function() {
                    document.getElementById(op + "Result").innerHTML = this.responseText;
                };
                xhttp.open("GET", "/proxy/" + op + "?a=" + a + "&b=" + b);
                xhttp.send();
            }
        </script>
    </body>
</html>
